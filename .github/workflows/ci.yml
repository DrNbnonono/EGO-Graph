name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm smoke
      - run: pnpm eval:smoke
      - run: pnpm eval:hardness:smoke
      - name: Upload hardness artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hardness-report
          path: hardness-artifacts/
          retention-days: 30
